<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066cc" />
      <stop offset="100%" stop-color="#004080" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.3" />
    </linearGradient>
  </defs>

  <g transform="translate(40, 40)">
    <circle cx="0" cy="0" r="38" fill="url(#circleGrad)" />
    
    <circle cx="0" cy="0" r="36.5" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" 
            stroke-dasharray="229.3 229.3" stroke-dashoffset="57.3" 
            transform="rotate(30)" />
    
    <text x="0" y="-4" font-family="SimHei, 'Microsoft YaHei', sans-serif" font-size="16" 
          font-weight="900" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">共点科技</text>
    
    <text x="0" y="11" font-family="Arial, sans-serif" font-size="9.5" 
          font-weight="bold" fill="#AECBFA" text-anchor="middle" dominant-baseline="middle">GONGDIAN</text>
  </g>
</svg>
